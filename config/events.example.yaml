defaults:
  intervalSeconds: 30
  jitterRatio: 0.25
  maxParallelPages: 1
  headless: false
  browserChannel: msedge
  userDataDir: .browser-profile
  logFile: logs/monitor.log
  screenshotDir: logs/screenshots

notifications:
  openclaw:
    enabled: false
    url: http://127.0.0.1:18789/hooks/wake
    tokenEnv: OPENCLAW_HOOKS_TOKEN
    mode: now

events:
  - name: example-event
    url: https://show.bilibili.com/platform/detail.html?id=example
    intervalSeconds: 30
    targets:
      - name: example-target
        keywords:
          - "2026-05-08"
          - "￥488"
          - "内场"
        quantity: 1
        priority: 1
